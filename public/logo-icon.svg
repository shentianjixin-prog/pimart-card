<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="PIMART">
  <!-- 黑白线条高级圆标 -->
  <circle cx="60" cy="60" r="52" stroke="#111827" stroke-width="5.5" fill="#FFFFFF"/>

  <!-- 交叉卡面（线条） -->
  <rect
    x="38" y="28" width="44" height="64" rx="7"
    stroke="#111827" stroke-width="3.2" fill="none"
    transform="rotate(-28 60 60)"
  />
  <rect
    x="38" y="28" width="44" height="64" rx="7"
    stroke="#111827" stroke-width="3.2" fill="none"
    transform="rotate(28 60 60)"
  />

  <!-- 中心 P + 速度线 -->
  <g transform="translate(60 62)">
    <!-- P 竖杆 -->
    <path d="M-10 -22 V22" stroke="#111827" stroke-width="6.2" stroke-linecap="round"/>
    <!-- P 上弯碗 -->
    <path
      d="M-10 -18 H2 C12 -18 18 -11 18 -2.5 C18 6.5 11 12 1 12 H-10"
      stroke="#111827"
      stroke-width="6.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <!-- 速度线 -->
    <path d="M-22 -8 H-2" stroke="#111827" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M-20 -1 H0" stroke="#111827" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M-18 6 H-4" stroke="#111827" stroke-width="3.2" stroke-linecap="round"/>
  </g>
</svg>

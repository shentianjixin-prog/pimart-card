<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="PIMART">
  <!-- 黑白线条高级圆标：叠卡 + 速度线 P -->
  <circle cx="60" cy="60" r="54" stroke="#111827" stroke-width="5" fill="#FFFFFF"/>
  <circle cx="60" cy="60" r="49.5" stroke="#111827" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- 后层卡（线框） -->
  <rect
    x="38" y="28" width="40" height="54" rx="7"
    fill="none" stroke="#111827" stroke-width="2"
    transform="rotate(-22 58 55)"
  />
  <!-- 中层卡（线框） -->
  <rect
    x="40" y="30" width="40" height="54" rx="7"
    fill="none" stroke="#111827" stroke-width="2"
    transform="rotate(18 60 57)"
  />
  <!-- 前层卡（白底黑框） -->
  <rect
    x="39" y="29" width="42" height="56" rx="7"
    fill="#FFFFFF" stroke="#111827" stroke-width="2.25"
    transform="rotate(-6 60 57)"
  />

  <!-- 速度线 P -->
  <g transform="translate(48.5 42)">
    <path
      d="M4 2 V34 H10.5 V20.5 H15.2 C21.8 20.5 26.2 16.2 26.2 10.2 C26.2 4.3 21.9 2 15.4 2 H4 Z
         M10.5 7.2 H14.8 C17.9 7.2 19.8 8.5 19.8 11.1 C19.8 13.7 17.9 15.2 14.8 15.2 H10.5 V7.2 Z"
      fill="#111827"
    />
    <!-- 左侧速度线 -->
    <path
      d="M-1 10.2 H8.5 M-2.5 13.2 H8.5 M-1 16.2 H8.5"
      stroke="#111827"
      stroke-width="2.1"
      stroke-linecap="round"
    />
  </g>
</svg>
